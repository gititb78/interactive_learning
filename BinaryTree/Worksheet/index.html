            warnings.push("שכחת נקודה-פסיק (;) בסוף הפקודה.");
          }

          const methods = ['HasLeft', 'HasRight', 'GetLeft', 'GetRight', 'GetValue', 'GetHeight', 'CountLeaves', 'IsPerfectTree', 'SumRichNodes', 'HasPathSum', 'IsUniform', 'OnePath'];
          
          methods.forEach(method => {
            const containsMethod = new RegExp(method, "i").test(userInput);
            const hasParentheses = new RegExp(method + "\\s*\\(", "i").test(userInput);
            if (containsMethod && !hasParentheses) {
              warnings.push(`שכחת סוגריים () בקריאה לפעולה ${method}.`);
            }
          });

          return warnings;
        }

        function highlightCode(code) {
          return code
            .replace(/(public|static|bool|int|if|return|double)/g, '<span class="text-pink-400">$1</span>')
            .replace(/(true|false|null)/g, '<span class="text-orange-400">$1</span>')
            .replace(/(\/\/.*)/g, '<span class="text-slate-500 italic">$1</span>')
            .replace(/(Math\.Pow|GetHeight|CountLeaves|HasLeft|HasRight|GetLeft|GetRight|GetValue|IsPerfectTree|SumRichNodes|HasPathSum|IsUniform|OnePath)/g, '<span class="text-blue-300">$1</span>')
            .replace(/(BinNode)/g, '<span class="text-emerald-300">$1</span>');
        }

        function WorksheetApp() {
          const [activeQuestionIdx, setActiveQuestionIdx] = useState(0);
          const [activeStepIdx, setActiveStepIdx] = useState(0);
          const [userInput, setUserInput] = useState('');
          const [hintLevel, setHintLevel] = useState(0);
          const [feedback, setFeedback] = useState(null); 
          const [accumulatedCode, setAccumulatedCode] = useState("");
          const [isQuestionComplete, setIsQuestionComplete] = useState(false);
          const [showIntro, setShowIntro] = useState(true);
          
          const [completedCodes, setCompletedCodes] = useState({});
          const [showCertificate, setShowCertificate] = useState(false);
          const [copied, setCopied] = useState(false);

          const currentQuestion = questionsData[activeQuestionIdx];
          const currentStep = currentQuestion.steps[activeStepIdx];

          const loadQuestion = (idx) => {
            setActiveQuestionIdx(idx);
            setActiveStepIdx(0);
            setUserInput('');
            setHintLevel(0);
            setFeedback(null);
            setAccumulatedCode("");
            setIsQuestionComplete(false);
          };

          const handleCheck = () => {
            if (!userInput.trim()) return;

            if (userInput.includes('___')) {
              setFeedback({ 
                type: 'error', 
                message: 'נא להשלים את כל קווי הריק (___) עם הקוד המתאים לפני הבדיקה.' 
              });
              return;
            }

            const inputLower = userInput.toLowerCase();
            const missingKeywords = currentStep.keywords.filter(kw => !inputLower.includes(kw.toLowerCase()));
            
            if (missingKeywords.length === 0) {
              const warnings = checkSyntaxWarnings(userInput, currentStep.solution);
              let waitTime = 1500; 
              
              if (warnings.length > 0) {
                setFeedback({ 
                  type: 'warning-pass', 
                  message: 'הכיוון נכון! מתקדם לשלב הבא... אבל שים לב לתיקוני התחביר הבאים:', 
                  details: warnings 
                });
                waitTime = 4000; 
              } else {
                setFeedback({ type: 'success', message: 'מעולה! השלמת את השלב בהצלחה.' });
              }
              
              setTimeout(() => {
                const newAccumulated = accumulatedCode + currentStep.solution;
                if (activeStepIdx < currentQuestion.steps.length - 1) {
                  setAccumulatedCode(newAccumulated);
                  setActiveStepIdx(prev => prev + 1);
                  setUserInput('');
                  setHintLevel(0);
                  setFeedback(null);
                } else {
                  const finalCode = newAccumulated + currentStep.closing;
                  setAccumulatedCode(finalCode);
                  setCompletedCodes(prev => ({ ...prev, [activeQuestionIdx]: finalCode }));
                  setIsQuestionComplete(true);
                }
              }, waitTime);

            } else {
              setFeedback({ 
                type: 'error', 
                message: 'חסרים חלקים קריטיים בקוד שלך. נסה שוב או בקש רמז!',
                details: [`חסרות מילות מפתח או סימנים כמו: ${missingKeywords.slice(0, 3).join(', ')}`]
              });
            }
          };

          const handleHint = () => {
            if (hintLevel < currentStep.hints.length) {
              setHintLevel(prev => prev + 1);
            } else {
              setUserInput(currentStep.template);
              setFeedback({ 
                type: 'info', 
                message: 'הנה תבנית חצי-מוכנה לעזרה. העתיקו, השלימו את קווי הריק (___) ולחצו על בדיקה.' 
              });
            }
          };

          const copyToClipboard = () => {
            const allCodeString = questionsData
              .map((q, idx) => completedCodes[idx] ? `// --- ${q.title} ---\n${completedCodes[idx]}` : '')
              .filter(Boolean)
              .join('\n\n');

            const textField = document.createElement('textarea');
            textField.innerText = allCodeString;
            document.body.appendChild(textField);
            textField.select();
            document.execCommand('copy');
            textField.remove();
            
            setCopied(true);
            setTimeout(() => setCopied(false), 3000);
          };

          if (showCertificate) {
            const isFullCompletion = !!completedCodes[3]; 
            const allCodeString = questionsData
              .map((q, idx) => completedCodes[idx] ? `// --- ${q.title} ---\n${completedCodes[idx]}` : '')
              .filter(Boolean)
              .join('\n\n');

            return (
              <div className="min-h-screen bg-slate-50 p-6 md:p-12 flex flex-col items-center font-sans" dir="rtl">
                <div className="max-w-4xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                  
                  <div className={`p-10 text-center text-white ${isFullCompletion ? 'bg-gradient-to-br from-blue-600 to-indigo-700' : 'bg-gradient-to-br from-amber-500 to-orange-600'}`}>
                    {isFullCompletion ? (
                      <Award className="w-24 h-24 mx-auto mb-4 text-blue-100" />
                    ) : (
                      <AlertTriangle className="w-24 h-24 mx-auto mb-4 text-amber-100" />
                    )}
                    <h1 className="text-4xl md:text-5xl font-bold mb-4">
                      {isFullCompletion ? 'תעודת הצטיינות' : 'תעודת הגשה חלקית'}
                    </h1>
                    <p className="text-xl md:text-2xl opacity-90 max-w-2xl mx-auto">
                      {isFullCompletion 
                        ? 'מדהים! פתרת והשלמת את כל דף העבודה בהצלחה, כולל שאלת האתגר. הקוד שלך מוכן להגשה.' 
                        : 'כל הכבוד על המאמץ! פתרת את שאלות 3, 4 ו-5. כיוון שבחרת לא לעשות את שאלה 6, הניקוד על המטלה יהיה חלקי.'}
                    </p>
                  </div>
                  
                  <div className="p-8 md:p-10">
                    <div className="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
                      <h2 className="text-2xl font-bold text-slate-800">הקוד שלך להגשה:</h2>
                      <button 
                        onClick={copyToClipboard}
                        className={`flex items-center justify-center gap-2 px-6 py-3 rounded-xl font-bold transition-all text-lg w-full md:w-auto shadow-sm
                          ${copied ? 'bg-green-100 text-green-700 border-green-200' : 'bg-slate-800 text-white hover:bg-slate-700'}`}
                      >
                        {copied ? <CheckCircle className="w-6 h-6" /> : <Copy className="w-6 h-6" />}
                        {copied ? 'הקוד הועתק בהצלחה!' : 'העתק הכל לקלאסרום'}
                      </button>
                    </div>
                    
                    <div className="bg-slate-900 rounded-xl p-6 md:p-8 overflow-auto max-h-[500px] border border-slate-700 shadow-inner" dir="ltr">
                      <pre className="font-mono text-[15px] leading-relaxed text-slate-300 whitespace-pre-wrap">
                        <code dangerouslySetInnerHTML={{ __html: highlightCode(allCodeString) }} />
                      </pre>
                    </div>
                    
                    <div className="mt-8 text-center">
                      <button 
                        onClick={() => window.location.reload()} 
                        className="text-slate-500 hover:text-slate-800 underline font-medium"
                      >
                        חזור להתחלה (איפוס)
                      </button>
                    </div>
                  </div>

                </div>
              </div>
            );
          }

          if (showIntro) {
            return (
              <div className="min-h-screen bg-slate-50 flex items-center justify-center p-6" dir="rtl">
                <div className="max-w-2xl bg-white rounded-2xl shadow-lg p-10 text-center border border-slate-200">
                  <BookOpen className="w-16 h-16 text-blue-600 mx-auto mb-6" />
                  <h1 className="text-3xl font-bold text-slate-900 mb-4">דף עבודה אינטראקטיבי: עצים בינאריים</h1>
                  <p className="text-lg text-slate-600 mb-8 leading-relaxed">
                    ברוכים הבאים לסביבת התרגול! כאן נעבור יחד על 4 השאלות המרכזיות מדף העבודה בקלאסרום.
                    בכל שלב תתבקשו לכתוב קטע קוד אחד בלבד. בסיום התהליך תוכלו להעתיק את כל הפתרונות שלכם במרוכז להגשה.
                  </p>
                  <button 
                    onClick={() => setShowIntro(false)}
                    className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold text-lg transition-all flex items-center gap-2 mx-auto shadow-md"
                  >
                    התחל לפתור <ArrowRight className="w-5 h-5" />
                  </button>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 text-slate-800 p-4 md:p-8 font-sans" dir="rtl">
              
              <div className="max-w-7xl mx-auto flex gap-2 mb-8 overflow-x-auto pb-2">
                {questionsData.map((q, idx) => (
                  <button
                    key={q.id}
                    onClick={() => loadQuestion(idx)}
                    className={`whitespace-nowrap px-6 py-3 rounded-xl font-bold transition-all text-sm
                      ${activeQuestionIdx === idx 
                        ? 'bg-blue-600 text-white shadow-md' 
                        : completedCodes[idx] 
                          ? 'bg-green-100 text-green-800 border border-green-200'
                          : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'}`}
                  >
                    {q.title} {completedCodes[idx] && '✓'}
                  </button>
                ))}
              </div>

              <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">
                
                <div className="w-full lg:w-1/2 flex flex-col gap-6">
                  
                  <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <h2 className="text-2xl font-bold text-slate-900 mb-3">{currentQuestion.title}</h2>
                    <p className="text-slate-700 leading-relaxed text-lg bg-blue-50 p-4 rounded-xl border border-blue-100">
                      {currentQuestion.description}
                    </p>
                  </div>

                  {!isQuestionComplete ? (
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex-1 flex flex-col">
                      
                      <div className="flex items-center justify-between mb-4">
                        <div className="flex items-center gap-2">
                          <PlayCircle className="text-blue-500 w-6 h-6" />
                          <h3 className="font-bold text-lg text-blue-900">משימה נוכחית:</h3>
                        </div>
                        <div className="text-sm font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">
                          {activeStepIdx + 1} / {currentQuestion.steps.length}
                        </div>
                      </div>
                      
                      <p className="text-lg font-medium mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
                        {currentStep.instruction}
                      </p>

                      <div className="flex-1 min-h-[120px] mb-6 relative">
                        <textarea
                          value={userInput}
                          onChange={(e) => setUserInput(e.target.value)}
                          placeholder="// הקלד את הקוד כאן..."
                          className="w-full h-full p-4 rounded-xl bg-slate-900 text-green-400 font-mono text-[16px] resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                          dir="ltr"
                        />
                      </div>

                      <div className="flex gap-4">
                        <button
                          onClick={handleCheck}
                          disabled={feedback?.type === 'success' || feedback?.type === 'warning-pass'}
                          className="flex-1 bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold transition-all flex justify-center items-center gap-2 disabled:opacity-50"
                        >
                          <CheckCircle className="w-5 h-5" /> בדוק תשובה
                        </button>
                        
                        <button
                          onClick={handleHint}
                          disabled={feedback?.type === 'success' || feedback?.type === 'warning-pass'}
                          className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-bold transition-all flex justify-center items-center gap-2 disabled:opacity-50 border border-slate-200"
                        >
                          <HelpCircle className="w-5 h-5 text-amber-500" />
                          {hintLevel < currentStep.hints.length ? "רמז קל" : "תן תבנית להשלמה"}
                        </button>
                      </div>

                      {hintLevel > 0 && hintLevel <= currentStep.hints.length && (
                        <div className="mt-4 p-4 bg-amber-50 border border-amber-200 rounded-xl animate-in fade-in">
                          <strong className="text-amber-800 flex items-center gap-2 mb-2">
                            <Lightbulb className="w-5 h-5" /> רמזים:
                          </strong>
                          <ul className="list-disc list-inside text-amber-900 space-y-1">
                            {currentStep.hints.slice(0, hintLevel).map((hint, i) => (
                              <li key={i}>{hint}</li>
                            ))}
                          </ul>
                        </div>
                      )}

                      {feedback && (
                        <div className={`mt-4 p-4 rounded-xl flex items-start gap-3 animate-in fade-in
                          ${feedback.type === 'success' ? 'bg-green-100 text-green-800' : 
                            feedback.type === 'warning-pass' ? 'bg-amber-100 border border-amber-300 text-amber-900' : 
                            feedback.type === 'info' ? 'bg-blue-100 text-blue-800' : 'bg-red-100 text-red-800'}`}>
                          
                          {feedback.type === 'success' ? <CheckCircle className="w-6 h-6 shrink-0 mt-0.5" /> : 
                           feedback.type === 'warning-pass' ? <AlertTriangle className="w-6 h-6 shrink-0 text-amber-600 mt-0.5" /> :
                           feedback.type === 'info' ? <HelpCircle className="w-6 h-6 shrink-0 mt-0.5" /> : 
                           <XCircle className="w-6 h-6 shrink-0 mt-0.5" />}
                          
                          <div>
                            <p className="font-bold">{feedback.message}</p>
                            {feedback.details && (
                              <ul className="list-disc list-inside mt-2 text-sm opacity-90 space-y-1">
                                {feedback.details.map((detail, i) => <li key={i}>{detail}</li>)}
                              </ul>
                            )}
                          </div>
                        </div>
                      )}

                    </div>
                  ) : (
                    <div className="bg-green-50 p-8 rounded-2xl shadow-sm border border-green-200 flex flex-col items-center text-center">
                      <CheckCircle className="w-20 h-20 text-green-500 mb-4" />
                      <h2 className="text-2xl font-bold text-green-800 mb-2">כל הכבוד! סיימת את השאלה.</h2>
                      <p className="text-green-700 mb-8">
                        הקוד המלא והנכון שבנית מופיע בחלונית העורך משמאל ונשמר לקראת ההגשה.
                      </p>
                      
                      {activeQuestionIdx < questionsData.length - 1 ? (
                        activeQuestionIdx === 2 ? ( 
                          <div className="flex flex-col gap-3 w-full max-w-sm">
                            <button 
                              onClick={() => loadQuestion(activeQuestionIdx + 1)}
                              className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all w-full shadow-md"
                            >
                              המשך לשאלה 6 (מומלץ!) <ChevronLeft className="w-5 h-5" />
                            </button>
                            <button 
                              onClick={() => setShowCertificate(true)}
                              className="bg-amber-100 hover:bg-amber-200 text-amber-800 border border-amber-300 px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 transition-all w-full"
                            >
                              סיום עכשיו (ניקוד חלקי) <Award className="w-5 h-5" />
                            </button>
                          </div>
                        ) : (
                          <button 
                            onClick={() => loadQuestion(activeQuestionIdx + 1)}
                            className="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition-all"
                          >
                            לשאלה הבאה <ChevronLeft className="w-5 h-5" />
                          </button>
                        )
                      ) : (
                        <div className="flex flex-col items-center gap-6">
                          <div className="text-xl font-bold text-blue-600 bg-blue-100 p-4 rounded-xl">
                            מדהים! סיימת את כל דף העבודה! 🎉
                          </div>
                          <button 
                            onClick={() => setShowCertificate(true)}
                            className="bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-xl font-bold text-lg flex items-center gap-2 transition-all shadow-lg hover:shadow-xl"
                          >
                            קבל תעודת הצטיינות והגש <Award className="w-6 h-6" />
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                <div className="w-full lg:w-1/2 flex flex-col min-h-[500px]">
                  <div className="bg-slate-900 rounded-2xl shadow-xl overflow-hidden flex flex-col h-full border border-slate-700">
                    <div className="bg-slate-800 px-4 py-3 flex items-center justify-between border-b border-slate-700">
                      <div className="flex gap-1.5">
                        <div className="w-3 h-3 rounded-full bg-red-500"></div>
                        <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                        <div className="w-3 h-3 rounded-full bg-green-500"></div>
                      </div>
                      <div className="text-slate-400 text-xs font-mono flex items-center gap-2">
                        <Code className="w-4 h-4" /> Solution.cs
                      </div>
                    </div>
                    
                    <div className="p-6 overflow-auto text-left flex-1" dir="ltr">
                      <pre className="font-mono text-[15px] leading-relaxed text-slate-300 whitespace-pre-wrap">
                        <code dangerouslySetInnerHTML={{ __html: highlightCode(accumulatedCode || "// הקוד שלך ייבנה כאן בהדרגה...") }} />
                        
                        {!isQuestionComplete && accumulatedCode && (
                          <span className="inline-block w-2 h-4 ml-1 bg-amber-400 animate-pulse align-middle"></span>
                        )}
                      </pre>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          );
        }

        // --- אתחול והרצת האפליקציה בתוך ה-HTML ---
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<WorksheetApp />);
    </script>
</body>
</html>
