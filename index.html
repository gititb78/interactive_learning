<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מאגר חומרי הלימוד של גיתית</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            margin: 0;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 40px;
            text-align: center;
            font-size: 32px;
        }
        .button-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            justify-content: center;
        }
        .sim-button {
            background-color: #3498db;
            color: white;
            padding: 20px 40px;
            text-decoration: none;
            text-align: center;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s, transform 0.2s;
            flex: 1; /* מוודא ששני הכפתורים יהיו באותו רוחב */
        }
        .sim-button:hover {
            background-color: #2980b9;
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        /* התאמה למסכים קטנים (טלפונים של התלמידים) */
        @media (max-width: 480px) {
            .button-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <h1>מאגר חומרי הלימוד של גיתית</h1>

    <div class="button-container">
        <a href="grade11/" class="sim-button">שכבת י"א</a>
        <a href="grade12/" class="sim-button">שכבת י"ב</a>
    </div>

</body>
</html>
