        // --- Helper: Levenshtein Distance for typo detection ---
        const getEditDistance = (a, b) => {
          if (a.length === 0) return b.length;
          if (b.length === 0) return a.length;
          const matrix = Array(b.length + 1).fill(null).map(() => Array(a.length + 1).fill(null));
          for (let i = 0; i <= a.length; i += 1) matrix[0][i] = i;
          for (let j = 0; j <= b.length; j += 1) matrix[j][0] = j;
          for (let j = 1; j <= b.length; j += 1) {
            for (let i = 1; i <= a.length; i += 1) {
              const indicator = a[i - 1] === b[j - 1] ? 0 : 1;
              matrix[j][i] = Math.min(
                matrix[j][i - 1] + 1,
                matrix[j - 1][i] + 1,
                matrix[j - 1][i - 1] + indicator
              );
            }
          }
          return matrix[b.length][a.length];
        };

        const App = () => {
          const [step, setStep] = useState(0);
          const [introPhase, setIntroPhase] = useState(0); // 0: Story, 1: Object, 2: Login

          const [gender, setGender] = useState(''); // 'M' or 'F'
          const [answers, setAnswers] = useState({
            1: '', 2: '', 3: null, 4: '', 5: null, 6: '', 7: '', 8: '', 9: null, 10: '', 11: '', 12: '', 13: '', 14: null, 15: ''
          });
          
          const [error, setError] = useState('');
          const [successMsg, setSuccessMsg] = useState('');
          const [warningMsg, setWarningMsg] = useState('');
          const [timestamp, setTimestamp] = useState('');
          const [hintLevel, setHintLevel] = useState(0);

          // Helper for gender-specific text
          const g = (m, f) => gender === 'F' ? f : m;

          const nextStep = () => {
            setError('');
            setSuccessMsg('');
            setWarningMsg('');
            setHintLevel(0);
            setStep(step + 1);
          };

          const updateAnswer = (qNum, val) => {
            setAnswers(prev => ({ ...prev, [qNum]: val }));
          };

          const showNextHint = () => {
            if (hintLevel < 3) setHintLevel(prev => prev + 1);
          };

          const cleanInput = (input) => {
            return (input || '').replace(/\s+/g, '').toLowerCase().replace(/;/g, '');
          };

          // --- Handlers ---
          const handleCodeSubmit = (qNum, validOptions, successText, errorTextFn) => {
            const cleanAns = cleanInput(answers[qNum]);
            
            // Check for exact or typo matches
            let isCorrect = false;
            let typoWarning = '';
            
            for (const opt of validOptions) {
              const cleanOpt = cleanInput(opt);
              if (cleanAns === cleanOpt) {
                isCorrect = true;
                break;
              }
              
              // If it's a code input > 3 chars, allow small typos (distance 1 or 2 depending on length)
              if (cleanAns.length > 3) {
                 const dist = getEditDistance(cleanAns, cleanOpt);
                 const threshold = cleanOpt.length > 10 ? 2 : 1;
                 if (dist > 0 && dist <= threshold) {
                   isCorrect = true;
                   typoWarning = `זיהינו שגיאת כתיב קלה, המערכת קיבלה את תשובתך אך שים לב לאיות הנכון: ${opt.replace(/\s+/g, '')}`;
                   break;
                 }
              }
            }
            
            if (isCorrect) {
              setSuccessMsg(successText);
              setWarningMsg(typoWarning);
              if (qNum === 15) setTimestamp(new Date().toLocaleString('he-IL'));
              setTimeout(nextStep, typoWarning ? 4000 : 2500); // Wait longer if there's a warning to read
            } else {
              setError(errorTextFn ? errorTextFn(cleanAns) : g('קוד שגוי או חסר. נסה שוב.', 'קוד שגוי או חסר. נסי שוב.'));
            }
          };

          const handleBugSubmit = (qNum, correctLine, successText, errorOptions) => {
            const ans = answers[qNum];
            if (ans === correctLine) {
              setSuccessMsg(successText);
              setTimeout(nextStep, 3500);
            } else if (ans === null) {
              setError(g('נא לבחור שורת קוד לפני הרצת הבדיקה.', 'נא לבחור שורת קוד לפני הרצת הבדיקה.'));
            } else {
              setError(errorOptions[ans] || g('שורה זו תקינה לחלוטין. חפש את השגיאה הלוגית במקום אחר.', 'שורה זו תקינה לחלוטין. חפשי את השגיאה הלוגית במקום אחר.'));
            }
          };

          // --- Validations ---
          const checkQ1 = () => handleCodeSubmit(1, 
            ['new int[maxsize]', 'new int[maxSize]'],
            g('גישה אושרה! הקצאת הזיכרון למערך העסקאות בוצעה בהצלחה.', 'גישה אושרה! הקצאת הזיכרון למערך העסקאות בוצעה בהצלחה.'),
            () => g('עליך להקצות זיכרון למערך מסוג int בגודל שמתקבל בפעולה הבונה (maxSize).', 'עליך להקצות זיכרון למערך מסוג int בגודל שמתקבל בפעולה הבונה (maxSize).')
          );

          const checkQ2 = () => handleCodeSubmit(2,
            ['0'],

            () => g('לאיזה ערך יש לאתחל את המונה (current) כאשר המערך עדיין ריק?', 'לאיזה ערך יש לאתחל את המונה (current) כאשר המערך עדיין ריק?')
          );

          const checkQ3 = () => handleBugSubmit(3, 1,
            g('פצחן מעולה! זיהית את הבאג. כתיבה לאינדקס + 1 מדלגת על תאים ותגרום לקריסת חריגה מגבולות המערך.', 'פצחנית מעולה! זיהית את הבאג. כתיבה לאינדקס + 1 מדלגת על תאים ותגרום לקריסת חריגה מגבולות המערך.'),

          );

          );

          const checkQ11 = () => handleCodeSubmit(11,
            ['this.trans[i]', 'trans[i]'],
            'העתקת הנתונים למערך המוגן עברה בהצלחה.',
            () => g('מאיפה עלינו להעתיק את הערך לתוך המערך החדש (safeCopy)?', 'מאיפה עלינו להעתיק את הערך לתוך המערך החדש (safeCopy)?')
          );

          const checkQ12 = () => handleCodeSubmit(12,
            ['new bitaccount(999,100)'],
            g('מצוין! עצם חשבון היעד נוצר בהצלחה ובמוכנות לפעולה.', 'מצוינת! עצם חשבון היעד נוצר בהצלחה ובמוכנות לפעולה.'),
            () => g('יש להשתמש במילה new ולאחריה שם המחלקה והפרמטרים הנדרשים בסוגריים.', 'יש להשתמש במילה new ולאחריה שם המחלקה והפרמטרים הנדרשים בסוגריים.')
          );

          const checkQ13 = () => handleCodeSubmit(13,
            ['acc.addtrans(-50)'],
            g('פעולת הפריצה הצליחה! הפעלת את המתודה ורשמת הוצאה עוינת.', 'פעולת הפריצה הצליחה! הפעלת את המתודה ורשמת הוצאה עוינת.'),
            () => g('שים לב, עליך להפעיל את הפעולה המתאימה על העצם acc ולהעביר הוצאה של 50 (מינוס 50).', 'שימי לב, עליך להפעיל את הפעולה המתאימה על העצם acc ולהעביר הוצאה של 50 (מינוס 50).')
          );

          const checkQ14 = () => handleBugSubmit(14, 2,
            g('ניסיון פריצה נבלם! trans מוגדר כ-private ואי אפשר לגשת אליו ישירות מחוץ למחלקה (Main).', 'ניסיון פריצה נבלם! trans מוגדר כ-private ואי אפשר לגשת אליו ישירות מחוץ למחלקה (Main).'),

          );

          const checkQ15 = () => handleCodeSubmit(15,
            ['target.getbalance()'],
            'הקריאה לפעולה הפומבית בוצעה. נתוני החשבון נפרצו במלואם!',
            () => g('עליך לקרוא לפעולה הפומבית המחזירה את היתרה מתוך העצם target.', 'עליך לקרוא לפעולה הפומבית המחזירה את היתרה מתוך העצם target.')
          );

          // --- Data Arrays for Bug Hunting Questions ---
          const q3Options = [
            { id: 0, code: "if (this.current >= this.trans.Length) return false;" },
            { id: 1, code: "this.trans[this.current + 1] = amount;" },
            { id: 2, code: "this.current++;" },
            { id: 3, code: "return true;" }
          ];

          const q5Options = [
            { id: 0, code: "int sum = 0;" },
            { id: 1, code: "for (int i = 0; i < this.trans.Length; i++) {" }, // BUG! Using Length instead of current
            { id: 2, code: "  sum += this.trans[i];" },
            { id: 3, code: "}" },
            { id: 4, code: "return sum;" }
          ];

          const q9Options = [
            { id: 0, code: "public int[] GetTrans() {" },
            { id: 1, code: "  return this.trans;" },
            { id: 2, code: "}" }
          ];

          const q14Options = [
            { id: 0, code: "BitAccount target = new BitAccount(555, 100);" },
            { id: 1, code: "target.AddTrans(200);" },
            { id: 2, code: "int total = target.trans.Sum();" }, // BUG! Direct access to private member
            { id: 3, code: "Console.WriteLine(total);" }
          ];

          // --- Hints Data ---
          const hintsData = {
            1: ['יצירת מערך נעשית באמצעות המילה השמורה new.', 'הגודל שאנחנו צריכים מגיע מהמשתנה maxSize.', 'תבנית: new int[maxSize]'],
